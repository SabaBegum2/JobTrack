<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobTrack - Calendar</title>
  <link rel="stylesheet" href="Styles.css" />
  <style>
    .page-title {
      font-size: 40px;
    }
  </style>
</head>

<body class="dashboard-page">

  <nav class="navbar">
    <div class="navbar-left">
      <a href="Dashboard.html" class="navbar-logo">
        <img src="../JobTrackLogo.png" alt="JobTrack" style="height: 70px;" />
      </a>
      <ul class="navbar-links">
        <li><a href="Dashboard.html">Dashboard</a></li>
        <li><a href="Applications.html">Applications</a></li>
        <li><a href="Calendar.html">Calendar</a></li>
        <li><a href="Resources.html">Resources</a></li>
        <li><a href="Settings.html">Settings ⚙️</a></li>
      </ul>
    </div>
    <div class="navbar-right">
      <div class="avatar" id="userAvatar" onclick="toggleDropdown()">AS</div>
      <div class="dropdown" id="avatarDropdown">
        <div class="dropdown-name" id="dropdownName">User</div>
        <hr style="border: none; border-top: 1px solid #eee; margin: 8px 0;">
        <a href="#" class="dropdown-item" onclick="logout()">Logout</a>
      </div>
    </div>
  </nav>

  <div class="dashboard-wrapper">
    <div class="topbar">
      <div class="topbar-left">
        <h1>Calendar</h1>
        <p>Track your interviews, deadlines, and follow-ups</p>
      </div>
      <div class="topbar-right">
        <button class="top-btn" onclick="openAddEvent()">+ Add Event</button>
      </div>
    </div>

    <div class="calendar-layout">

      <!-- CALENDAR -->
      <div class="calendar-card">
        <div class="calendar-header">
          <h2 id="calMonthYear"></h2>
          <div class="cal-nav">
            <button onclick="changeMonth(-1)">&#8249;</button>
            <button onclick="changeMonth(1)">&#8250;</button>
          </div>
        </div>
        <table class="calendar-grid">
          <thead>
            <tr>
              <th>Sun</th>
              <th>Mon</th>
              <th>Tue</th>
              <th>Wed</th>
              <th>Thu</th>
              <th>Fri</th>
              <th>Sat</th>
            </tr>
          </thead>
          <tbody id="calBody"></tbody>
        </table>
      </div>

      <!-- SIDE PANEL -->
      <div class="side-panel">

        <!-- TODAY -->
        <div class="side-card">
          <h3>Today</h3>
          <div id="todayEvents">
            <p style="color:#aaa; font-size:13px;">No events today.</p>
          </div>
        </div>

        <!-- UPCOMING -->
        <div class="side-card">
          <h3>Upcoming</h3>
          <div id="upcomingEvents">
            <p style="color:#aaa; font-size:13px;">No upcoming events.</p>
          </div>
        </div>

        <!-- LEGEND -->
        <div class="side-card">
          <h3>Legend</h3>
          <div class="legend-list">
            <div class="legend-item">
              <div class="legend-dot" style="background:#267a38;"></div> Interview
            </div>
            <div class="legend-item">
              <div class="legend-dot" style="background:#b33939;"></div> Deadline
            </div>
            <div class="legend-item">
              <div class="legend-dot" style="background:#8a6d1d;"></div> Follow-up
            </div>
            <div class="legend-item">
              <div class="legend-dot" style="background:#0d5ea8;"></div> Offer
            </div>
            <div class="legend-item">
              <div class="legend-dot" style="background:#5c3fa3;"></div> Other
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ADD EVENT MODAL -->
  <div class="modal-overlay" id="addEventModal">
    <div class="modal-box">
      <h2>Add Event</h2>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="eventTitle" placeholder="e.g. Interview at Google" />
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="eventDate" />
      </div>
      <div class="form-group">
        <label>Time (optional)</label>
        <input type="time" id="eventTime" />
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="eventType">
          <option value="interview">Interview</option>
          <option value="deadline">Deadline</option>
          <option value="followup">Follow-up</option>
          <option value="offer">Offer</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="modal-buttons">
        <button class="top-btn" onclick="saveEvent()" style="flex:1;">Save</button>
        <button class="top-btn cancel-btn" onclick="closeAddEvent()" style="flex:1;">Cancel</button>
      </div>
    </div>
  </div>

  <!-- EVENT DETAIL MODAL (Edit / Delete) -->
  <div class="modal-overlay" id="detailModal">
    <div class="detail-modal-box">
      <h2 id="detailTitle"></h2>
      <div class="detail-meta" id="detailMeta"></div>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="editTitle" />
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="editDate" />
      </div>
      <div class="form-group">
        <label>Time (optional)</label>
        <input type="time" id="editTime" />
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="editType">
          <option value="interview">Interview</option>
          <option value="deadline">Deadline</option>
          <option value="followup">Follow-up</option>
          <option value="offer">Offer</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="detail-buttons">
        <button class="top-btn edit-btn" onclick="updateEvent()" style="flex:1;">Save Changes</button>
        <button class="top-btn delete-btn" onclick="deleteEvent()" style="flex:1;">Delete</button>
        <button class="top-btn cancel-btn" onclick="closeDetailModal()" style="flex:1;">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const savedTheme = localStorage.getItem('jt-theme') || 'dark';
    if (savedTheme === 'light') document.body.classList.add('light-mode');
    if (savedTheme === 'dark') document.body.classList.add('dark-mode');

    // ---- USER / AUTH ----
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user) window.location.href = 'Login.html';

    if (user && user.full_name) {
      const initials = user.full_name.split(' ').map(n => n[0]).join('').toUpperCase();
      document.getElementById('userAvatar').textContent = initials;
      document.getElementById('dropdownName').textContent = user.full_name;
    }

    const currentPage = window.location.pathname.split('/').pop();
    document.querySelectorAll('.navbar-links a').forEach(link => {
      if (link.getAttribute('href') === currentPage) link.classList.add('active');
    });

    function toggleDropdown() {
      document.getElementById('avatarDropdown').classList.toggle('show');
    }

    document.addEventListener('click', function (e) {
      const avatar = document.getElementById('userAvatar');
      const dropdown = document.getElementById('avatarDropdown');
      if (!avatar.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.remove('show');
      }
    });

    function logout() {
      localStorage.removeItem('user');
      window.location.href = 'Login.html';
    }

    // ---- CALENDAR STATE ----
    let currentDate = new Date();
    let events = [];
    let selectedEventId = null;

    // ---- CONSTANTS ----
    const typeLabels = {
      interview: 'Interview',
      deadline: 'Deadline',
      followup: 'Follow-up',
      offer: 'Offer',
      other: 'Other'
    };

    const pillClass = {
      interview: 'pill-interview',
      deadline: 'pill-deadline',
      followup: 'pill-followup',
      offer: 'pill-offer',
      other: 'pill-other'
    };

    const tagColors = {
      interview: 'background:#d9f7df; color:#267a38;',
      deadline: 'background:#ffe0e0; color:#b33939;',
      followup: 'background:#fff4cc; color:#8a6d1d;',
      offer: 'background:#d9ecff; color:#0d5ea8;',
      other: 'background:#e5dcff; color:#5c3fa3;'
    };

    // ---- FETCH EVENTS ----
    async function loadEvents() {
      try {
        const response = await fetch(`http://localhost:3000/api/calendar/events?user_id=${user.id}`);
        if (!response.ok) throw new Error('Failed to fetch events');
        events = await response.json();
      } catch (err) {
        console.error('Could not load events:', err);
      }
      renderCalendar();
    }

    // ---- RENDER CALENDAR ----
    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const today = new Date();

      document.getElementById('calMonthYear').textContent =
        currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrev = new Date(year, month, 0).getDate();

      const tbody = document.getElementById('calBody');
      tbody.innerHTML = '';

      let day = 1, nextDay = 1;
      let prevDay = daysInPrev - firstDay + 1;

      for (let row = 0; row < 6; row++) {
        const tr = document.createElement('tr');
        for (let col = 0; col < 7; col++) {
          const td = document.createElement('td');

          if (row === 0 && col < firstDay) {
            td.classList.add('other-month');
            td.innerHTML = `<div class="day-num">${prevDay}</div>`;
            prevDay++;
          } else if (day > daysInMonth) {
            td.classList.add('other-month');
            td.innerHTML = `<div class="day-num">${nextDay}</div>`;
            nextDay++;
          } else {
            const mm = String(month + 1).padStart(2, '0');
            const dd = String(day).padStart(2, '0');
            const cellDate = `${year}-${mm}-${dd}`;

            const isToday = day === today.getDate() &&
              month === today.getMonth() &&
              year === today.getFullYear();

            if (isToday) td.classList.add('today');

            const dayEvents = events.filter(e => e.date === cellDate);
            let html = `<div class="day-num">${day}</div>`;
            dayEvents.forEach(ev => {
              html += `<div class="event-pill ${pillClass[ev.type]}" onclick="openDetailModal(${ev.id})">${ev.title}</div>`;
            });
            td.innerHTML = html;
            day++;
          }
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
        if (day > daysInMonth && row >= 3) break;
      }

      renderSidePanel();
    }

    // ---- RENDER SIDE PANEL ----
    function renderSidePanel() {
      const today = new Date();
      const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

      const todayEvs = events.filter(e => e.date === todayStr);
      const todayEl = document.getElementById('todayEvents');
      todayEl.innerHTML = todayEvs.length === 0
        ? '<p style="color:#aaa; font-size:13px;">No events today.</p>'
        : todayEvs.map(e => `
            <div class="event-item" onclick="openDetailModal(${e.id})" style="cursor:pointer;">
              <div class="event-item-title">${e.title}</div>
              <div class="event-item-meta">
                <span class="event-tag" style="${tagColors[e.type]}">${typeLabels[e.type]}</span>
                ${e.time ? '· ' + formatTime(e.time) : ''}
              </div>
            </div>`).join('');

      const upcoming = events
        .filter(e => e.date > todayStr)
        .sort((a, b) => a.date.localeCompare(b.date))
        .slice(0, 5);

      const upcomingEl = document.getElementById('upcomingEvents');
      upcomingEl.innerHTML = upcoming.length === 0
        ? '<p style="color:#aaa; font-size:13px;">No upcoming events.</p>'
        : upcoming.map(e => `
            <div class="event-item" onclick="openDetailModal(${e.id})" style="cursor:pointer;">
              <div class="event-item-title">${e.title}</div>
              <div class="event-item-meta">
                <span class="event-tag" style="${tagColors[e.type]}">${typeLabels[e.type]}</span>
                · ${formatDate(e.date)}${e.time ? ' · ' + formatTime(e.time) : ''}
              </div>
            </div>`).join('');
    }

    // ---- DETAIL MODAL ----
    function openDetailModal(id) {
      const ev = events.find(e => e.id === id);
      if (!ev) return;
      selectedEventId = id;
      document.getElementById('editTitle').value = ev.title;
      document.getElementById('editDate').value = ev.date;
      document.getElementById('editTime').value = ev.time || '';
      document.getElementById('editType').value = ev.type;
      document.getElementById('detailModal').classList.add('show');
    }

    function closeDetailModal() {
      selectedEventId = null;
      document.getElementById('detailModal').classList.remove('show');
    }

    // ---- UPDATE EVENT ----
    async function updateEvent() {
      const title = document.getElementById('editTitle').value.trim();
      const date = document.getElementById('editDate').value;
      const time = document.getElementById('editTime').value;
      const type = document.getElementById('editType').value;

      if (!title || !date) { alert('Title and date are required.'); return; }

      try {
        const res = await fetch(`http://localhost:3000/api/calendar/events/${selectedEventId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, date, time, type })
        });
        if (!res.ok) throw new Error('Update failed');
        const idx = events.findIndex(e => e.id === selectedEventId);
        events[idx] = { ...events[idx], title, date, time, type };
        closeDetailModal();
        renderCalendar();
      } catch (err) {
        console.error(err);
        alert('Failed to update event.');
      }
    }

    // ---- DELETE EVENT ----
    async function deleteEvent() {
      if (!confirm('Are you sure you want to delete this event?')) return;
      try {
        const res = await fetch(`http://localhost:3000/api/calendar/events/${selectedEventId}`, {
          method: 'DELETE'
        });
        if (!res.ok) throw new Error('Delete failed');
        events = events.filter(e => e.id !== selectedEventId);
        closeDetailModal();
        renderCalendar();
      } catch (err) {
        console.error(err);
        alert('Failed to delete event.');
      }
    }

    // ---- HELPERS ----
    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleString('default', { month: 'short', day: 'numeric' });
    }

    function formatTime(timeStr) {
      const [h, m] = timeStr.split(':');
      const d = new Date();
      d.setHours(h, m);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function changeMonth(dir) {
      currentDate.setMonth(currentDate.getMonth() + dir);
      renderCalendar();
    }

    // ---- ADD EVENT MODAL ----
    function openAddEvent() {
      document.getElementById('addEventModal').classList.add('show');
    }

    function closeAddEvent() {
      document.getElementById('addEventModal').classList.remove('show');
      document.getElementById('eventTitle').value = '';
      document.getElementById('eventDate').value = '';
      document.getElementById('eventTime').value = '';
      document.getElementById('eventType').value = 'interview';
    }

    async function saveEvent() {
      const title = document.getElementById('eventTitle').value.trim();
      const date = document.getElementById('eventDate').value;
      const time = document.getElementById('eventTime').value;
      const type = document.getElementById('eventType').value;

      if (!title || !date) { alert('Title and date are required.'); return; }

      try {
        const res = await fetch('http://localhost:3000/api/calendar/events', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: user.id, title, date, time, type })
        });
        if (!res.ok) throw new Error('Save failed');
        const saved = await res.json();
        events.push(saved);
        closeAddEvent();
        renderCalendar();
      } catch (err) {
        console.error(err);
        alert('Failed to save event.');
      }
    }

    // ---- INIT ----
    loadEvents();
  </script>
</body>

</html>
