<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobTrack - Dashboard</title>
  <link rel="stylesheet" href="Styles.css" />
  <style>
    .dashboard-wrapper {
      min-height: 100vh;
      background: #f4f7fb;
      padding: 30px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      padding: 18px 24px;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .topbar-left h1 {
      font-size: 28px;
      margin: 0;
      color: #1f3c88;
    }

    .topbar-left p {
      margin: 6px 0 0;
      color: #666;
      font-size: 14px;
    }

    .topbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .top-btn {
      background: #1f3c88;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      transition: 0.3s;
    }

    .top-btn:hover {
      background: #16306d;
    }

    .logout-btn {
      background: #d9534f;
    }

    .logout-btn:hover {
      background: #b63d3a;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
    }

    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .stat-card h3 {
      margin: 0;
      font-size: 16px;
      color: #555;
    }

    .stat-card p {
      margin-top: 10px;
      font-size: 28px;
      font-weight: bold;
      color: #1f3c88;
    }

    .dashboard-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    .dashboard-card h2 {
      margin-top: 0;
      color: #1f3c88;
      margin-bottom: 18px;
    }

    .table-responsive {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 750px;
    }

    th, td {
      text-align: left;
      padding: 14px 12px;
      border-bottom: 1px solid #e5e5e5;
      font-size: 14px;
    }

    th {
      background: #f8faff;
      color: #333;
    }

    .status {
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
      display: inline-block;
    }

    .interested {
      background: #fff4cc;
      color: #8a6d1d;
    }

    .applied {
      background: #d9ecff;
      color: #0d5ea8;
    }

    .interviewing {
      background: #e5dcff;
      color: #5c3fa3;
    }

    .offer {
      background: #d9f7df;
      color: #267a38;
    }

    .rejected {
      background: #ffe0e0;
      color: #b33939;
    }

    .action-btn {
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      margin-right: 6px;
    }

    .edit-btn {
      background: #1f3c88;
      color: white;
    }

    .delete-btn {
      background: #d9534f;
      color: white;
    }

    .empty-text {
      color: #777;
      text-align: center;
      padding: 20px 0;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="dashboard-wrapper">
    <div class="topbar">
      <div class="topbar-left">
        <h1>JobTrack Dashboard</h1>
        <p>Track and manage your job applications in one place.</p>
      </div>

      <div class="topbar-right">
        <a href="#" class="top-btn">+ Add Application</a>
        <a href="Index.html" class="top-btn logout-btn">Logout</a>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Applications</h3>
        <p id="totalCount">0</p>
      </div>
      <div class="stat-card">
        <h3>Applied</h3>
        <p id="appliedCount">0</p>
      </div>
      <div class="stat-card">
        <h3>Interviewing</h3>
        <p id="interviewCount">0</p>
      </div>
      <div class="stat-card">
        <h3>Offers</h3>
        <p id="offerCount">0</p>
      </div>
      <div class="stat-card">
        <h3>Rejected</h3>
        <p id="rejectedCount">0</p>
      </div>
    </div>

    <div class="dashboard-card">
      <h2>My Applications</h2>

      <div class="table-responsive">
        <table id="applicationTable">
          <thead>
            <tr>
              <th>Company</th>
              <th>Job Title</th>
              <th>Application Date</th>
              <th>Status</th>
              <th>Notes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="applicationBody">
          </tbody>
        </table>
      </div>

      <div id="emptyMessage" class="empty-text" style="display: none;">
        No applications found.
      </div>
    </div>
  </div>

  <script>
    const applications = [
      {
        company: "Amazon",
        title: "Area Manager Intern",
        date: "2026-03-10",
        status: "Applied",
        notes: "Submitted through company website"
      },
      {
        company: "Google",
        title: "IT Support Specialist",
        date: "2026-03-08",
        status: "Interviewing",
        notes: "Phone interview scheduled"
      },
      {
        company: "Microsoft",
        title: "Cloud Analyst",
        date: "2026-03-05",
        status: "Offer",
        notes: "Waiting for final response"
      },
      {
        company: "Ford",
        title: "Systems Intern",
        date: "2026-03-02",
        status: "Rejected",
        notes: "Application closed"
      },
      {
        company: "Rocket Mortgage",
        title: "Frontend Developer Intern",
        date: "2026-03-01",
        status: "Interested",
        notes: "Need to apply this week"
      }
    ];

    const applicationBody = document.getElementById("applicationBody");
    const emptyMessage = document.getElementById("emptyMessage");

    function getStatusClass(status) {
      switch (status.toLowerCase()) {
        case "interested":
          return "interested";
        case "applied":
          return "applied";
        case "interviewing":
          return "interviewing";
        case "offer":
          return "offer";
        case "rejected":
          return "rejected";
        default:
          return "";
      }
    }

    function renderApplications() {
      applicationBody.innerHTML = "";

      if (applications.length === 0) {
        emptyMessage.style.display = "block";
        document.getElementById("applicationTable").style.display = "none";
        return;
      } else {
        emptyMessage.style.display = "none";
        document.getElementById("applicationTable").style.display = "table";
      }

      applications.forEach((app, index) => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${app.company}</td>
          <td>${app.title}</td>
          <td>${app.date}</td>
          <td><span class="status ${getStatusClass(app.status)}">${app.status}</span></td>
          <td>${app.notes}</td>
          <td>
            <button class="action-btn edit-btn" onclick="editApplication(${index})">Edit</button>
            <button class="action-btn delete-btn" onclick="deleteApplication(${index})">Delete</button>
          </td>
        `;

        applicationBody.appendChild(row);
      });

      updateStats();
    }

    function updateStats() {
      document.getElementById("totalCount").textContent = applications.length;
      document.getElementById("appliedCount").textContent = applications.filter(app => app.status === "Applied").length;
      document.getElementById("interviewCount").textContent = applications.filter(app => app.status === "Interviewing").length;
      document.getElementById("offerCount").textContent = applications.filter(app => app.status === "Offer").length;
      document.getElementById("rejectedCount").textContent = applications.filter(app => app.status === "Rejected").length;
    }

    function editApplication(index) {
      alert("Edit feature will be added later for this application: " + applications[index].company);
    }

    function deleteApplication(index) {
      const confirmDelete = confirm("Are you sure you want to delete this application?");
      if (confirmDelete) {
        applications.splice(index, 1);
        renderApplications();
      }
    }

    renderApplications();
  </script>
</body>
</html>
