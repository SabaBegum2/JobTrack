<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobTrack - Login</title>
  <link rel="stylesheet" href="Styles.css" />

</head>

<body class="login-page">

  <div class="login-wrapper">

    <div class="login-logo">
      <img src="./JobTrackLogo.png" alt="JobTrack Logo" style="height: 55px; vertical-align: middle;" />
      <h1>JobTrack</h1>
    </div>

    <div class="login-box">
      <h2>Welcome Back</h2>
      <p>Sign in to continue to your JobTrack account.</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
        </div>

        <div class="form-row">
          <label class="remember">
            <input type="checkbox" />
            <span>Remember me</span>
          </label>
          <a href="forgotPassword.html">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">Login</button>
      </form>

      <div class="helper-box">
        <strong>Demo Login</strong><br>
        Email: demo@jobtrack.com<br>
        Password: demo123
      </div>

      <div id="message" class="message"></div>

      <div class="bottom-text">
        Don't have an account? <a href="Registeration.html">Register</a>
      </div>
    </div>

  </div>

  <script>
    const loginForm = document.getElementById("loginForm");
    const message = document.getElementById("message");

    loginForm.addEventListener("submit", async function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        message.textContent = "Please fill in all fields.";
        message.className = "message error";
        return;
      }

      try {
        const response = await fetch("http://localhost:3000/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('user', JSON.stringify(data.user));
          message.textContent = "Login successful! Redirecting...";
          message.className = "message success";
          setTimeout(() => { window.location.href = "Dashboard.html"; }, 1500);
        } else {
          message.textContent = data.message || "Invalid email or password.";
          message.className = "message error";
        }
      } catch (err) {
        message.textContent = "Could not connect to server. Try again.";
        message.className = "message error";
      }
    });
  </script>
</body>

</html>
