<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobTrack - Reset Password</title>
  <link rel="stylesheet" href="Styles.css" />
  <style>
    .strength-wrap {
      margin-top: 8px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .strength-bar {
      height: 100%;
      border-radius: 999px;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }

    .strength-label {
      font-size: 12px;
      margin-top: 5px;
      font-weight: 600;
      min-height: 16px;
    }
  </style>
</head>

<body class="login-page">

  <div class="login-wrapper">

    <div class="login-logo">
      <img src="./JobTrackLogo.png" alt="JobTrack Logo" style="height: 55px; vertical-align: middle;" />
      <h1>JobTrack</h1>
    </div>

    <div class="login-box">

      <!-- Reset form -->
      <div id="resetSection">
        <h2>Reset Password</h2>
        <p style="margin: 16px 0;">Choose a new password for your account.</p>

        <form id="resetForm">
          <!-- hidden token field - auto filled from URL -->
          <input type="hidden" id="token" />

          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" placeholder="Enter new password" required
              oninput="checkStrength(this.value)" />
            <div class="strength-wrap">
              <div class="strength-bar" id="strengthBar"></div>
            </div>
            <div class="strength-label" id="strengthLabel"></div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm New Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm your new password" required />
          </div>

          <button type="submit" class="login-btn" id="submitBtn">Reset Password</button>
        </form>
      </div>

      <!-- Success state -->
      <div id="successSection" style="display: none; text-align: center; padding: 10px 0;">
        <h2>Password Updated</h2>
        <p style="margin-bottom: 24px;">Your password has been reset successfully. Taking you back to login now.</p>
        <a href="Login.html" class="login-btn" style="display: block; text-align: center; text-decoration: none;">
          Go to Login
        </a>
      </div>

      <div id="message" class="message"></div>

      <div class="bottom-text">
        <a href="forgotPassword.html">Get a new link</a>
        &nbsp;·&nbsp;
        <a href="Login.html">Back to Login</a>
      </div>
    </div>
  </div>
  

  <script>
    const resetForm = document.getElementById('resetForm');
    const message = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    // Auto-fill token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const tokenFromUrl = urlParams.get('token');
    if (tokenFromUrl) {
      document.getElementById('token').value = tokenFromUrl;
    } else {
      message.textContent = 'Invalid or missing reset link. Please request a new one.';
      message.className = 'message error';
      submitBtn.disabled = true;
    }

    function checkStrength(password) {
      const bar = document.getElementById('strengthBar');
      const label = document.getElementById('strengthLabel');

      if (!password) {
        bar.style.width = '0%';
        label.textContent = '';
        return;
      }

      let score = 0;
      if (password.length >= 6) score++;
      if (password.length >= 10) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;

      const levels = [
        { color: '#ef4444', text: 'Very weak', width: '20%' },
        { color: '#f97316', text: 'Weak', width: '40%' },
        { color: '#eab308', text: 'Fair', width: '60%' },
        { color: '#22c55e', text: 'Strong', width: '80%' },
        { color: '#16a34a', text: 'Very strong', width: '100%' },
      ];

      const level = levels[Math.min(score - 1, 4)];
      bar.style.width = level.width;
      bar.style.background = level.color;
      label.textContent = level.text;
      label.style.color = level.color;
    }

    resetForm.addEventListener('submit', async function (e) {
      e.preventDefault();

      const token = document.getElementById('token').value.trim();
      const newPassword = document.getElementById('newPassword').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();

      if (!newPassword || !confirmPassword) {
        message.textContent = 'Please fill in all fields.';
        message.className = 'message error';
        return;
      }

      if (newPassword.length < 6) {
        message.textContent = 'Password must be at least 6 characters.';
        message.className = 'message error';
        return;
      }

      if (newPassword !== confirmPassword) {
        message.textContent = 'Passwords do not match.';
        message.className = 'message error';
        return;
      }

      submitBtn.textContent = 'Resetting...';
      submitBtn.disabled = true;

      try {
        const response = await fetch(' http://18.216.228.113:3000/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, new_password: newPassword })
        });

        const data = await response.json();

        if (response.ok) {
          document.getElementById('resetSection').style.display = 'none';
          document.getElementById('successSection').style.display = 'block';
          message.textContent = '';
          setTimeout(() => { window.location.href = 'Login.html'; }, 3000);
        } else {
          message.textContent = data.message || 'Invalid or expired token.';
          message.className = 'message error';
          submitBtn.textContent = 'Reset Password';
          submitBtn.disabled = false;
        }
      } catch (err) {
        message.textContent = 'Could not connect to server. Please try again.';
        message.className = 'message error';
        submitBtn.textContent = 'Reset Password';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>

</html>
